name: Build Yumi

# 触发条件：当推送到 main 分支，或者发布 tag 时触发。
# workflow_dispatch 允许在 GitHub 网页端手动点击运行。
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Package
    # 使用最新的 Ubuntu 运行环境
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 2. 配置 Node.js 环境 (用于编译 WebUI)
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24' # 推荐使用 LTS 版本
          
      # 3. 安装 WebUI 依赖
      - name: Install WebUI dependencies
        working-directory: ./webui
        run: npm install

      # 4. 配置 Rust Nightly 环境并添加 Android 交叉编译目标
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android
          components: rust-src # build-std 需要用到

      # 5. 安装 Android NDK
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29

      # 6. 配置 NDK 环境变量并安装 cargo-ndk
      - name: Setup cargo-ndk
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          cargo install cargo-ndk

      # 7. 运行 xtask 构建脚本
      - name: Run xtask build
        run: cargo xtask build

      # 8. 动态获取 xtask 生成的 zip 文件名
      - name: Get Artifact Name
        id: artifact-name
        run: |
          # 找到 output 目录下生成的 zip 文件路径
          FILE_PATH=$(ls output/*.zip | head -n 1)
          # 提取纯文件名 (例如 yumi-1.0.0-42-20260409-2000.zip)
          FILE_NAME=$(basename "$FILE_PATH")
          # 去掉 .zip 后缀，防止 GitHub 下载时变成 .zip.zip
          ARTIFACT_NAME="${FILE_NAME%.zip}"
          
          # 将提取出的名字和路径存入 GitHub 环境变量，供下一步使用
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "path=$FILE_PATH" >> $GITHUB_OUTPUT

      # 9. 使用动态名称上传构建产物
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # 使用上一步获取的动态名称
          name: ${{ steps.artifact-name.outputs.name }}
          # 精确指定要上传的那一个文件
          path: ${{ steps.artifact-name.outputs.path }}
