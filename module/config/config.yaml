# 元数据信息
meta:
  name: "default_config"
  author: "yuki"
  language: "en"
  loglevel: "INFO"

# 主要功能开关
function:
  CpuIdleScalingGovernor: false
  IOOptimization: true

# IO 设置
IO_Settings:
  Scheduler: "none"
  read_ahead_kb: "128"
  nomerges: "2"
  iostats: "0"

# CPU 空闲设置
CpuIdle:
  current_governor: ""

# --- 性能模式 ---

# 省电模式
powersave:
  cpu_load_governor:
    up_threshold: 0.85
    down_threshold: 0.60
    smoothing_up: 0.40
    smoothing_down: 0.50
    down_rate_limit_ticks: 2
    headroom_factor: 1.10
    perf_floor: 0.10
    perf_ceil: 0.70
    perf_init: 0.30

# 均衡模式
balance:
  cpu_load_governor:
    up_threshold: 0.80
    down_threshold: 0.50
    smoothing_up: 0.60
    smoothing_down: 0.30
    down_rate_limit_ticks: 3
    headroom_factor: 1.25
    perf_floor: 0.15
    perf_ceil: 1.0
    perf_init: 0.50

# 性能模式
performance:
  cpu_load_governor:
    up_threshold: 0.65
    down_threshold: 0.40
    smoothing_up: 0.80
    smoothing_down: 0.20
    down_rate_limit_ticks: 5
    headroom_factor: 1.40
    perf_floor: 0.35
    perf_ceil: 1.0
    perf_init: 0.60

# 极速模式
fast:
  cpu_load_governor:
    up_threshold: 0.01
    down_threshold: 0.01
    smoothing_up: 1.0
    smoothing_down: 0.01
    down_rate_limit_ticks: 10
    headroom_factor: 2.0
    perf_floor: 1.0
    perf_ceil: 1.0
    perf_init: 1.0